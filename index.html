<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mountain Clock</title>
    <!-- Cache busting requirements -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap&v=m9k3p1">
    <style>
        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #0f172a;
            /* Modern dark mountain landscape background via Unsplash */
            background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=3840&auto=format&fit=crop&v=m9k3p1');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* Subtle gradient overlay to ensure text contrast */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .clock-container {
            position: relative;
            z-index: 2;
            text-align: center;
            text-shadow: 0 4px 16px rgba(0, 0, 0, 0.6), 0 2px 4px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .date {
            font-size: min(4vw, 5vh);
            font-weight: 300;
            margin-bottom: 0.5vh;
            letter-spacing: 0.02em;
        }

        .time {
            font-size: min(15vw, 20vh);
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.03em;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="clock-container">
        <div class="date" id="dateDisplay"></div>
        <div class="time" id="timeDisplay"></div>
    </div>

    <script>
        function getOrdinalSuffix(i) {
            const j = i % 10, k = i % 100;
            if (j == 1 && k != 11) return i + "st";
            if (j == 2 && k != 12) return i + "nd";
            if (j == 3 && k != 13) return i + "rd";
            return i + "th";
        }

        function updateClock() {
            const now = new Date();

            // Format Time (e.g., 1:34:53 PM)
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            const ampm = hours >= 12 ? 'PM' : 'AM';

            hours = hours % 12;
            hours = hours ? hours : 12; // convert 0 to 12

            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            document.getElementById('timeDisplay').textContent = `${hours}:${minutes}:${seconds} ${ampm}`;

            // Format Date (e.g., March 17th, 2026)
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const month = months[now.getMonth()];
            const day = now.getDate();
            const year = now.getFullYear();

            document.getElementById('dateDisplay').textContent = `${month} ${getOrdinalSuffix(day)}, ${year}`;
        }

        // Initialize clock immediately
        updateClock();

        // Update clock every second
        setInterval(updateClock, 1000);
    </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
